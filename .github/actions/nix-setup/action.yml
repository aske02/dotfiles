name: "Setup Nix"
runs:
    using: "composite"
    steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Install Nix
          uses: cachix/install-nix-action@v31
          with:
              nix_path: nixpkgs=channel:nixos-unstable

        - name: Use magic Nix cache
          uses: DeterminateSystems/magic-nix-cache-action@v13
